<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Showdown Leaderboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: white;
  background: linear-gradient(90deg, #c58b1c 0%, #1a2a4f 100%);
}

/* TOP BAR */
.topbar {
  background: #0b0f1a;
  padding: 15px 30px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
  background: linear-gradient(90deg, rgba(255,180,0,0.2), rgba(0,150,255,0.2));
}

.hero h1 {
  font-size: 60px;
  margin: 0;
  letter-spacing: 3px;
}

.hero p {
  margin-top: 10px;
  font-size: 18px;
  color: #ddd;
}

/* ALERT BOX */
.alert {
  margin: 40px auto;
  max-width: 700px;
  background: rgba(255, 0, 0, 0.15);
  border: 2px solid rgba(255, 0, 0, 0.6);
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  color: #ff6b6b;
  font-weight: bold;
}

/* LEADERBOARD */
.board {
  max-width: 900px;
  margin: 40px auto;
  background: rgba(0,0,0,0.4);
  border-radius: 10px;
  overflow: hidden;
}

.row {
  display: flex;
  padding: 15px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  align-items: center;
}

.row:nth-child(odd) {
  background: rgba(255,255,255,0.05);
}

.rank {
  width: 80px;
  font-weight: bold;
  text-align: center;
}

.points {
  width: 120px;
  text-align: center;
}

.player {
  flex: 1;
}

.you {
  background: rgba(255,255,0,0.2);
  border-left: 5px solid yellow;
}

/* REMOVED STYLE */
.removed {
  text-decoration: line-through;
  color: #ff6b6b;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 30px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="topbar">FORTNITE SHOWDOWN</div>

<div class="hero">
  <h1>SHOWDOWN</h1>
  <p>GLOBAL LEADERBOARD</p>
</div>

<div class="alert">
  You have been removed from the leaderboard due to cheating.
</div>

<div class="board">

  <div class="row">
    <div class="rank">1</div>
    <div class="points">6,093</div>
    <div class="player">Valoyify</div>
  </div>

  <div class="row">
    <div class="rank">2</div>
    <div class="points">5,802</div>
    <div class="player">Joao</div>
  </div>

  <div class="row">
    <div class="rank">3</div>
    <div class="points">5,701</div>
    <div class="player">Ratgun</div>
  </div>

  <div class="row you">
    <div class="rank">39</div>
    <div class="points removed">2,469</div>
    <div class="player removed">YourName (YOU)</div>
  </div>

</div>

<div class="footer">
  Competitive Integrity Notice • Showdown Series
</div>

</body>
</html>
